name: Znap
options:
  bundleIdPrefix: com.znap
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
settings:
  SWIFT_VERSION: "5.9"
  CODE_SIGN_STYLE: Automatic
  DEVELOPMENT_TEAM: F92RQULD22
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
targets:
  Znap:
    type: application
    platform: macOS
    sources:
      - Znap/Sources
    resources:
      - Znap/Resources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.znap.app
      CODE_SIGN_ENTITLEMENTS: Znap/Sources/Znap.entitlements
      INFOPLIST_FILE: Znap/Sources/Info.plist
      GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: Sparkle
  ZnapTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Znap/Tests
    dependencies:
      - target: Znap
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.znap.tests
      GENERATE_INFOPLIST_FILE: true
